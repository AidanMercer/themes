# nature — "golden hour": sun-warmed botanical over three video meadows
bar_position = "top"

# ── honey gold & leaf green over deep pine glass ────────────────────
# accents pulled from the frames: the sun flare and daisy hearts (gold),
# the meadow foliage (sage), petal blush (dusty rose). `accent` also
# drives the Super+M popup chrome.
accent      = "#e8a63c"   # warm honey gold — sun flare, daisy hearts
accent2     = "#93b077"   # sage leaf green — stems, foliage
accent3     = "#d4877c"   # dusty rose — petal blush / danger
accent_warn = "#e0b06a"   # soft apricot — warnings, mid load
accent_dim  = "#5c6b54"   # moss gray-green — traces, dividers

text  = "#f2e8d5"   # warm cream
glass = "#1c2820"   # deep pine green — panel tint behind blur

# terminal base + the hues the accents don't cover; theme-colors.sh
# builds the kitty/fuzzel/hyprlock palettes from these on switch
bg        = "#16211a"   # deep forest floor
fg        = "#f2e8d5"
hue_green = "#93b077"   # leaf
hue_blue  = "#7ba3b5"   # misty wetland blue (frame 2 sky / frame 3 haze)

font_mono = "Noto Sans Mono"

# marketplace one-liner (shown in the Super+/ store)
tagline = "golden hour — a botanist's field journal"
