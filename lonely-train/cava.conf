# cava config for the lonely-train cassette deck visualizer.
# raw ascii on stdout: one line per frame, 44 values 0..1000 separated by ';'.

[general]
bars = 44
framerate = 60
autosens = 1

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
noise_reduction = 0.5
