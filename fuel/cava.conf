# cava config for the fuel theme's pump-display visualizer.
# raw ascii on stdout: one line per frame, 20 values 0..1000 separated by ';'.

[general]
bars = 20
framerate = 45
autosens = 1

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
noise_reduction = 0.5
