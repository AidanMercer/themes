# cava config for the sailing theme's sea-swell visualizer.
# raw ascii on stdout: one line per frame, 36 values 0..1000 separated by ';'.
# heavier smoothing than usual — swells roll, they don't flicker.

[general]
bars = 36
framerate = 30
autosens = 1

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
noise_reduction = 0.72
