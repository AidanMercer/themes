# cava config for downpour's rain gauge.
# raw ascii on stdout: one line per frame, 28 values 0..1000 separated by ';'.

[general]
bars = 28
framerate = 60
autosens = 1
# stop emitting frames after 5s of silence; wakes on any audio
sleep_timer = 5

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
noise_reduction = 0.72
