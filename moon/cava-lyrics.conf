# cava config for the moon lyric visualizer's SILENCE detector (NOT the reactor).
# Same wire format as cava.conf (40 ascii ints 0..1000, ';'-separated, one line per
# frame), but autosens is OFF so the energy reading is ABSOLUTE: true silence reads
# as tiny bars. (autosens=1 ramps gain up during quiet passages and makes silence
# look loud — wrong for a silence gate.) Read by lyrics.qml's own cava process on
# the primary screen only.
#
# If end-of-line words never release on instrumental gaps, the mix is too quiet for
# silenceEnter (lower it in lyrics.qml, or raise `sensitivity` here). If they release
# mid-vocal, raise silenceEnter / lower sensitivity. Default sink here is Bluetooth,
# which scales differently from analog, so some tuning by ear is expected.

[general]
bars = 40
framerate = 60
autosens = 0
sensitivity = 100

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
# light smoothing — lyrics.qml runs its own envelope; don't let cava lag the gap
noise_reduction = 0.20
