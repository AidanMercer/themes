# bar style for the moon theme
bubbles = true
bar_position = "top"

# ── cyberpunk palette ───────────────────────────────────────────────
# accent colors for moon's custom widgets (clock, cava, bar, sysinfo, lyrics) —
# the shell parses this file and hands the widgets a `pal` object. edit these to
# re-tint the whole theme. `accent` doubles as the Super+M control popup's accent.
accent      = "#fcee0a"   # primary neon yellow
accent2     = "#00e5ff"   # secondary cyan
accent3     = "#ff2e6c"   # alert magenta / chromatic fringe
accent_warn = "#ffae3d"   # amber, mid-threshold load
accent_dim  = "#7c7a3a"   # muted trace — dividers, ghosts

# terminal base + the two hues the accents don't cover (green/blue). these feed
# theme-colors.sh, which builds the kitty/fuzzel/hyprlock palettes on switch.
bg          = "#0a0a12"   # near-black background
fg          = "#d8ecff"   # cool white text

# shell chrome base (was inherited from default — pinned so moon is
# self-contained; same values, no visual change)
text  = "#e6e6f0"
glass = "#0f0f14"
hue_green   = "#00e5a0"   # cyber teal-green
hue_blue    = "#2d8cff"   # electric blue

# cyberpunk chrome on the Super+M control popup (dark card, neon edges)
cyber = true
font_mono = "Noto Sans Mono"

# marketplace one-liner (shown in the Super+/ store)
tagline = "night city neon — edgerunners chrome and CRT glow"
