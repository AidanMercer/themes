# cava config for bog's pond-surface visualizer.
# raw ascii on stdout: one line per frame, 36 values 0..1000 separated by ';'.

[general]
bars = 36
framerate = 60
autosens = 1
# stop emitting frames after 5s of silence; wakes on any audio
sleep_timer = 5

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
# heavier smoothing than the house default — folktale pace, no chop
noise_reduction = 0.72
