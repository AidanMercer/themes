# cava config for avalon's bloom visualizer.
# raw ascii on stdout: one line per frame, 24 values 0..1000 separated by ';'.

[general]
bars = 24
framerate = 60
autosens = 1

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
noise_reduction = 0.55
