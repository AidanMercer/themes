# avalon — the forest shrine. moss and buttercup over pond-dark glass,
# sampled from the wallpaper then tamed enough to sit quiet on the dark.
bar_position = "top"

accent      = "#8fbe58"   # fresh moss in the sunlight
accent2     = "#e6d75a"   # the buttercups
accent3     = "#c97e52"   # lantern rust — danger / power
accent_warn = "#cfae5e"   # hay amber
accent_dim  = "#4c5a42"   # dark sage traces, dividers

text  = "#e9edd8"   # pale moss-cream
glass = "#11170f"   # pond-dark panel tint

# terminal base + the hues the accents don't cover; theme-colors.sh
# builds the kitty/fuzzel/hyprlock palettes from these on switch
bg        = "#0c110a"
fg        = "#dde3c8"
hue_green = "#8fbe58"   # moss
hue_blue  = "#6c8d99"   # pond slate

font_mono = "Noto Sans Mono"

# marketplace one-liner (shown in the Super+/ store)
tagline = "petals and gold — a knight asleep in the meadow"
